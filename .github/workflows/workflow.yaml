on:
  push:
env:
  instruments_url: "https://ftp.osuosl.org/pub/musescore/soundfont/MuseScore_General"
jobs:
  main_job:
    continue-on-error: true
    strategy:
      matrix:
        os: [macos-latest, macos-13, ubuntu-26.04, windows-latest]
    runs-on: ${{matrix.os}}
    steps:
    - name: Download
      uses: actions/checkout@v4

    - name: Update Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: sudo apt-get update
    
    - name: Install dependencies on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: >
        sudo apt-get install
        binutils
        cmake
        fluidsynth
        libfluidsynth-dev
        libqt6svg6-dev
        libxml2-dev
        qt6-base-dev

    - name: Install gcovr on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: pipx install gcovr

    - name: Install dependencies on MacOS
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
      run: brew install fluid-synth ninja qt libxml2

    - name: Add MSVC to path on Windows
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install cmake on Windows
      if: matrix.os == 'windows-latest'
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~3.25.0"

    - name: Install Qt on Windows
      if: matrix.os == 'windows-latest'
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.6.3"
        cache: true

    - name: Install vcpkg packages on windows
      uses: lukka/run-vcpkg@v11
      if: matrix.os == 'windows-latest'
      with:
        vcpkgGitCommitId: 'f6729a3ac3bfdefc999aa8e3664f8014370886b8'

    - name: Restore soundfont files from the cache if available
      id: soundfont_step
      uses: actions/cache@v4
      with:
        path: share
        key: ${{matrix.os}}-soundfont_cache

    - name: Download the soundfont if not in the cache
      if: steps.soundfont_step.outputs.cache-hit != 'true'
      run: >
        curl "${{env.instruments_url}}/MuseScore_General.sf2"
        --output "share/MuseScore_General.sf2"

    - name: Download the soundfont license if not in the cache
      if: steps.soundfont_step.outputs.cache-hit != 'true'
      run: >
        curl "${{env.instruments_url}}/MuseScore_General_License.md"
        --output "share/MuseScore_General_License.md"
    
    - name: Configure with tests on Unix
      if: matrix.os != 'windows-latest'
      run: >
        cmake -S . -B with_tests
        -DBUILD_TESTS=ON
        -DCMAKE_BUILD_TYPE=Debug
        -DNO_REALTIME_AUDIO=ON
        -DTRACK_COVERAGE=ON

    - name: Configure with tests on Windows
      if: matrix.os == 'windows-latest'
      run: >
        cmake -S . -B with_tests
        -DBUILD_TESTS=ON
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_TOOLCHAIN_FILE=${{env.VCPKG_ROOT}}/scripts/buildsystems/vcpkg.cmake
        -DNO_REALTIME_AUDIO=ON

    - name: Build with tests
      run: cmake --build with_tests --config Debug
  
    # proves the deploy script in CMakeLists.txt actually bundled everything
    # run_tests needs -- otherwise this and the Release build below would
    # both silently pass/link against the brew-installed copies regardless of
    # what macdeployqt actually bundled, since dyld falls back to any
    # load-command path macdeployqt failed to rewrite to a bundle-relative one
    - name: Remove dependencies before testing on MacOS
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
      run: brew uninstall fluid-synth qt libxml2 && brew autoremove

    - name: Test on MacOS
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
      run: cd with_tests; QT_QPA_PLATFORM=offscreen ctest --build-config Debug --verbose

    # the Release build below links against these the same way the Debug
    # build did, so they have to come back before "Configure without tests
    # on MacOS"
    - name: Reinstall dependencies for the release build on MacOS
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
      run: brew install fluid-synth qt libxml2

    - name: Remove dependencies before testing on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: >
        sudo apt-get remove --purge -y
        fluidsynth
        libfluidsynth-dev
        libqt6svg6-dev
        libxml2-dev
        qt6-base-dev
        && sudo apt-get autoremove --purge -y

    - name: Test on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: cd with_tests; QT_QPA_PLATFORM=offscreen ctest --build-config Debug --verbose

    # the Release build below links against these the same way the Debug
    # build did, so they have to come back before "Configure without tests
    # on Ubuntu"
    - name: Reinstall dependencies for the release build on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: >
        sudo apt-get install -y
        fluidsynth
        libfluidsynth-dev
        libqt6svg6-dev
        libxml2-dev
        qt6-base-dev

    # same idea as the MacOS/Ubuntu steps above, but ld.so's system-directory
    # fallback and dyld's load-command rewriting don't apply on Windows --
    # instead install-qt-action puts Qt's own bin dir on PATH and sets
    # QT_PLUGIN_PATH, either of which could mask a gap in what
    # qt_generate_deploy_app_script/windeployqt actually deployed. This is
    # scoped to the step's own process, so no reinstall step is needed --
    # the Release build below still sees the original PATH/QT_PLUGIN_PATH.
    - name: Test on Windows
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike "$env:QT_ROOT_DIR*" }) -join ';'
        Remove-Item Env:\QT_PLUGIN_PATH -ErrorAction SilentlyContinue
        cd with_tests
        ctest --build-config Debug --verbose

    - name: Run gcovr
      if: matrix.os == 'ubuntu-26.04'
      # --filter targets library/ (renamed from src/ in 704b1074, which
      # silently broke this filter -- gcovr matched 0 files and uploaded an
      # empty report for the past year). Most `default: Q_ASSERT(false);`
      # arms of exhaustive switches over RowType/Qt::Orientation were removed
      # outright in the source (the compiler already proves them dead via
      # -Wswitch); --exclude-lines-by-pattern catches the handful that had to
      # stay because the switched-on enum has a fixed underlying type
      # (RowType : std::uint8_t) so the compiler can't prove exhaustiveness
      # and needs an explicit default to avoid -Wreturn-type. There are no
      # `throw` statements anywhere in library/ -- --exclude-throw-branches
      # drops the compiler-generated exception-unwind edges GCC adds to every
      # call to a non-noexcept function, which otherwise dominate the branch
      # count and can't be exercised without deliberately forcing failures
      # like std::bad_alloc.
      run: >
        gcovr --xml "coverage.xml"
        --filter "$(pwd)/library/"
        --exclude-lines-by-pattern "Q_ASSERT\(false\);"

    - name: Upload code coverage
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-26.04'
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Configure without tests on MacOS 13
      if: matrix.os == 'macos-13'
      run: >
        cmake -S . -B without_tests
        -DCMAKE_BUILD_TYPE=Release
        -DCPACK_GENERATOR=ZIP
        -DCPACK_PACKAGE_FILE_NAME=Justly-MacOS-Intel

    - name: Configure without tests on MacOS latest
      if: matrix.os == 'macos-latest'
      run: >
        cmake -S . -B without_tests
        -DCMAKE_BUILD_TYPE=Release
        -DCPACK_GENERATOR=ZIP
        -DCPACK_PACKAGE_FILE_NAME=Justly-MacOS-arm64

    - name: Configure without tests on Ubuntu
      if: matrix.os == 'ubuntu-26.04'
      run: >
        cmake -S . -B without_tests
        -DCMAKE_BUILD_TYPE=Release
        -DCPACK_GENERATOR=TGZ
        -DCPACK_PACKAGE_FILE_NAME=Justly-Linux
        
    - name: Configure without tests on Windows
      if: matrix.os == 'windows-latest'
      run: >
        cmake -S . -B without_tests
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_TOOLCHAIN_FILE=${{env.VCPKG_ROOT}}/scripts/buildsystems/vcpkg.cmake
        -DCPACK_GENERATOR=ZIP
        -DCPACK_PACKAGE_FILE_NAME=Justly-Windows

    - name: Build without tests
      run: cmake --build without_tests --config Release

    - name: Package
      run: cd without_tests; cpack -C Release

    - name: Release on a new tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/Justly-*.tar.gz
          **/Justly-*.zip
